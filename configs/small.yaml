# Small preset (~36M). A mid-scale sanity run; feasible on a single small GPU.
preset: small
vocab_size: 32000
data_dir: data
out_dir: runs/small

block_size: 1024
batch_size: 24
grad_accum: 8          # effective ~196k tokens/step

max_tokens: 2000000000 # 2B tokens
warmup_steps: 500
lr: 0.0006
min_lr: 0.00006
beta2: 0.95
weight_decay: 0.1
grad_clip: 1.0

seed: 1337
log_interval: 20
eval_interval: 500
eval_iters: 100
ckpt_interval: 1000
