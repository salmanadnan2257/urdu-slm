# Tiny CPU proof run. ~10M params. Trains to a visibly decreasing loss on CPU.
preset: tiny
vocab_size: 32000
data_dir: data
out_dir: runs/tiny

block_size: 256
batch_size: 16
grad_accum: 2          # effective batch = 32 sequences = 8192 tokens/step

# 4.1M tokens = 500 steps at 8192 tokens/step. This reproduces the committed
# proof run (docs/tiny_run_loss.png, runs/tiny/model.pt). Raise for a longer run;
# the loss is still clearly decreasing at step 500, not converged.
max_tokens: 4096000
warmup_steps: 80
lr: 0.0006
min_lr: 0.00006
beta2: 0.95
weight_decay: 0.1
grad_clip: 1.0

seed: 1337
log_interval: 20
eval_interval: 200
eval_iters: 40
ckpt_interval: 500
